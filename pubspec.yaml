name: base_match
description: "草野球対戦履歴アプリ - バッターxピッチャー、チームxチームの因縁を記録・共有"

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Sharing
  share_plus: ^10.1.4

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Testing
  mocktail: ^1.0.4

  # Code Generation
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - .env
    - .env.local
    - assets/splash.png
