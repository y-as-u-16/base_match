name: Test

on:
  pull_request:
    branches:
      - develop
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.env.example'
      - 'supabase/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.svg'
      - '**/*.ico'

jobs:
  test:
    name: Flutter Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create dummy env files
        run: |
          touch .env
          touch .env.local

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test